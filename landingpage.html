<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f7f3ea",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#81d2e5",
                        "surface-container-high": "#ebe8df",
                        "surface": "#fcf9f0",
                        "on-secondary-container": "#656464",
                        "secondary-fixed": "#e4e2e1",
                        "primary": "#9a131d",
                        "on-error-container": "#93000a",
                        "surface-tint": "#b3282c",
                        "outline": "#8d706e",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-primary-fixed": "#410004",
                        "on-tertiary-container": "#a8eeff",
                        "primary-fixed": "#ffdad7",
                        "on-surface-variant": "#59413f",
                        "error": "#ba1a1a",
                        "background": "#fcf9f0",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#e1bebc",
                        "secondary-container": "#e4e2e1",
                        "secondary": "#5f5e5e",
                        "surface-variant": "#e5e2da",
                        "inverse-on-surface": "#f4f1e8",
                        "surface-dim": "#dddad1",
                        "surface-container": "#f1eee5",
                        "on-background": "#1c1c17",
                        "surface-bright": "#fcf9f0",
                        "surface-container-highest": "#e5e2da",
                        "on-surface": "#1c1c17",
                        "tertiary": "#005562",
                        "inverse-primary": "#ffb3ae",
                        "tertiary-container": "#006f80",
                        "on-secondary-fixed-variant": "#474747",
                        "inverse-surface": "#31312b",
                        "on-primary-fixed-variant": "#900918",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb3ae",
                        "on-primary-container": "#ffdbd8",
                        "tertiary-fixed": "#a7eeff",
                        "primary-container": "#bc2f32",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#001f25",
                        "on-tertiary-fixed-variant": "#004e5b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Newsreader"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf9f0;
            color: #1c1c17;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="font-body selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<main class="min-h-screen flex flex-col items-center justify-between w-full">
<!-- Title Section: Positioned center-top -->
<section class="flex flex-col items-center text-center mt-32 md:mt-48 space-y-8 w-full max-w-screen-2xl px-6 md:px-12 mx-auto">
<h1 class="text-8xl md:text-[12rem] font-headline font-light tracking-tighter text-on-surface leading-none">
                罗聘年谱
            </h1>
<p class="font-label text-sm md:text-lg tracking-[0.6em] uppercase text-outline">
                Digital Chronicle of Luo Pin (1733–1799)
            </p>
</section>
<!-- Artwork Section: Moved to bottom with margin-bottom -->
<section class="w-full flex flex-col items-center mb-32 md:mb-48">
<div class="w-full">
<div class="relative group shadow-[0_35px_60px_-15px_rgba(0,0,0,0.15)] overflow-hidden bg-surface-container-low">
<img alt="Classical Chinese painting by Luo Pin" class="w-full h-auto object-contain transform transition-transform duration-1000 group-hover:scale-[1.02]" src="images/luopinmei.jpg"/>
</div>
</div>
</section>
</main>
<!-- Minimal Footer -->
<footer class="w-full py-16 flex flex-col items-center justify-center bg-surface-container-low">
</footer>
</body></html>
