<!-- Data Loader -->
<script src="../src/js/data-loader.js"></script>

<script>
// Load stats from JSON data
async function loadStats() {
    try {
        const data = await window.luoPinData.getAllData();

        // Calculate year range
        const years = data.map(item => parseInt(item.year));
        const minYear = Math.min(...years);
        const maxYear = Math.max(...years);

        // Update stats
        document.getElementById('total-count').textContent = data.length;
        document.getElementById('year-range').textContent = `${minYear}-${maxYear}`;

    } catch (error) {
        console.error('Failed to load stats:', error);
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', loadStats);
</script>
