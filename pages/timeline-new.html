<!-- 数据加载模块 -->
<script src="../src/js/data-loader.js"></script>

<!-- 动态加载脚本 -->
<script>
    // 动态加载年谱数据
    document.addEventListener('DOMContentLoaded', async () => {
        const chronologyContainer = document.getElementById('chronology-container');
        const timelineLine = document.getElementById('timeline-line');
        const loadingState = document.getElementById('loading-state');

        if (!chronologyContainer) {
            console.error('找不到chronology-container元素');
            return;
        }

        try {
            const data = await window.luoPinData.getAllData();

            if (data.length === 0) {
                loadingState.innerHTML = '<div class="text-red-500">数据加载失败</div>';
                return;
            }

            // 隐藏加载状态
            loadingState.style.display = 'none';

            // 生成时间轴内容
            const timelineHTML = data.map(item => `
                <div class="relative grid grid-cols-1 md:grid-cols-3 gap-4 py-6 border-b border-outline-variant/10 timeline-entry" data-year="${item.year}">
                    <div class="md:text-right pr-6 z-10 timeline-trigger">
                        <div class="flex flex-col md:items-end">
                            <span class="text-xl md:text-2xl font-headline font-medium text-primary">${item.year}</span>
                            <span class="text-sm md:text-base font-headline text-on-surface mt-1">${item.qing_calendar}</span>
                            <span class="font-label text-[10px] uppercase tracking-wide text-outline mt-2 bg-surface-container-low px-2 py-1 inline-block">${item.age}岁</span>
                        </div>
                    </div>
                    <div class="md:col-span-2 pl-2 md:pl-8">
                        <div class="max-w-xl">
                            ${item.title ? `<p class="text-base md:text-lg leading-normal font-serif mb-2">${item.title}</p>` : ''}
                            <p class="text-base md:text-lg leading-normal font-serif mb-2">${item.description}</p>
                            ${item.date ? `<p class="text-sm font-serif text-outline mb-1">${item.date}</p>` : ''}
                            ${item.reference ? `<p class="text-xs font-label text-outline text-right italic tracking-wide">参考文献: ${item.reference}</p>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            // 添加到容器中
            chronologyContainer.insertAdjacentHTML('beforeend', timelineHTML);

            // 重新初始化观察器，确保新加载的内容有动画效果
            const observerOptions = {
                root: null,
                rootMargin: '0px 0px -15% 0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.timeline-trigger').forEach(el => observer.observe(el));
            timelineLine.classList.add('is-visible');

            // 初始化左侧年份滑动轴
            const yearScroller = document.getElementById('year-scroller');
            const yearSlider = document.getElementById('year-slider');
            const yearValue = document.getElementById('year-value');
            const timelineEntries = Array.from(document.querySelectorAll('.timeline-entry'));
            const yearTargets = new Map();
            const years = [...new Set(data.map(item => parseInt(item.year, 10)).filter(year => !Number.isNaN(year)))].sort((a, b) => a - b);

            timelineEntries.forEach((entry) => {
                const year = parseInt(entry.dataset.year, 10);
                if (!Number.isNaN(year) && !yearTargets.has(year)) {
                    yearTargets.set(year, entry);
                }
            });

            if (years.length > 0) {
                const minYear = years[0];
                const maxYear = years[years.length - 1];
                let isDraggingSlider = false;
                let ticking = false;

                yearSlider.min = String(minYear);
                yearSlider.max = String(maxYear);
                yearSlider.value = String(minYear);
                yearValue.textContent = `${minYear}年`;
                yearScroller.classList.remove('hidden');

                const getNearestYearTarget = (targetYear) => {
                    if (yearTargets.has(targetYear)) return targetYear;
                    const nextYear = years.find(year => year >= targetYear);
                    return nextYear ?? years[years.length - 1];
                };

                const scrollToYear = (targetYear) => {
                    const matchedYear = getNearestYearTarget(targetYear);
                    const targetEntry = yearTargets.get(matchedYear);
                    if (!targetEntry) return;
                    const targetTop = targetEntry.getBoundingClientRect().top + window.scrollY - 110;
                    window.scrollTo({ top: targetTop, behavior: 'auto' });
                };

                const getCurrentVisibleYear = () => {
                    const threshold = window.innerHeight * 0.35;
                    let currentYear = minYear;
                    for (const entry of timelineEntries) {
                        const rect = entry.getBoundingClientRect();
                        if (rect.top <= threshold) {
                            const year = parseInt(entry.dataset.year, 10);
                            if (!Number.isNaN(year)) currentYear = year;
                        } else {
                            break;
                        }
                    }
                    return currentYear;
                };

                yearSlider.addEventListener('input', () => {
                    isDraggingSlider = true;
                    const targetYear = parseInt(yearSlider.value, 10);
                    yearValue.textContent = `${targetYear}年`;
                    scrollToYear(targetYear);
                });

                yearSlider.addEventListener('change', () => {
                    isDraggingSlider = false;
                });

                window.addEventListener('scroll', () => {
                    if (isDraggingSlider || ticking) return;
                    ticking = true;
                    requestAnimationFrame(() => {
                        const currentYear = getCurrentVisibleYear();
                        yearSlider.value = String(currentYear);
                        yearValue.textContent = `${currentYear}年`;
                        ticking = false;
                    });
                });
            }

        } catch (error) {
            console.error('加载年谱数据失败:', error);
            loadingState.innerHTML = '<div class="text-red-500">数据加载失败，请刷新页面重试</div>';
        }
    });
</script>
