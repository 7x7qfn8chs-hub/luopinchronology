<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luo Pin Chronicle - The Silent Archivist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#BC2F32",
                "background-light": "#f8f6f6",
                "background-dark": "#1f1313",
                "primary-fixed": "#ffdad7",
                "on-secondary-fixed": "#1b1c1c",
                "surface-container-lowest": "#ffffff",
                "surface": "#fcf9f0",
                "on-secondary-container": "#656464",
                "surface-bright": "#fcf9f0",
                "secondary-fixed": "#e4e2e1",
                "tertiary-fixed-dim": "#81d2e5",
                "tertiary": "#005562",
                "secondary-fixed-dim": "#c8c6c5",
                "on-primary-fixed": "#410004",
                "surface-container-low": "#f7f3ea",
                "tertiary-fixed": "#a7eeff",
                "on-surface-variant": "#59413f",
                "primary-fixed-dim": "#ffb3ae",
                "on-error-container": "#93000a",
                "surface-container-high": "#ebe8df",
                "on-tertiary-fixed": "#001f25",
                "on-secondary-fixed-variant": "#474747",
                "on-secondary": "#ffffff",
                "tertiary-container": "#006f80",
                "inverse-primary": "#ffb3ae",
                "inverse-on-surface": "#f4f1e8",
                "secondary": "#5f5e5e",
                "surface-tint": "#b3282c",
                "on-tertiary-fixed-variant": "#004e5b",
                "error-container": "#ffdad6",
                "primary-container": "#bc2f32",
                "surface-variant": "#e5e2da",
                "outline": "#8d706e",
                "inverse-surface": "#31312b",
                "secondary-container": "#e4e2e1",
                "outline-variant": "#e1bebc",
                "surface-container-highest": "#e5e2da",
                "surface-dim": "#dddad1",
                "on-primary-fixed-variant": "#900918",
                "on-primary": "#ffffff",
                "on-surface": "#1c1c17",
                "on-tertiary": "#ffffff",
                "surface-container": "#f1eee5",
                "on-tertiary-container": "#a8eeff",
                "on-primary-container": "#ffdbd8",
                "error": "#ba1a1a",
                "on-background": "#1c1c17"
              },
              "borderRadius": {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
              "fontFamily": {
                "display": ["Newsreader"],
                "headline": ["Noto Serif SC", "serif"],
                "body": ["Noto Serif SC", "serif"],
                "label": ["Noto Serif SC", "serif"]
              }
            },
          },
        }</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        #search-toggle:checked ~ .search-keyword-container {
            width: 0;
            opacity: 0;
            padding: 0;
            pointer-events: none;
            overflow: hidden;
        }
        #search-toggle:checked ~ .search-time-container {
            width: 100%;
            opacity: 1;
        }
        #search-toggle:not(:checked) ~ .search-time-container {
            width: 40%;
        }

        .transition-all-custom {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Loading states */
        .loading-state {
            text-align: center;
            padding: 4rem 0;
        }
        .loading-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 2px solid #e1bebc;
            border-radius: 50%;
            border-top-color: #9a131d;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Search suggestions */
        .suggestion-item:hover {
            background-color: rgba(156, 19, 29, 0.1);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                height: auto;
            }
            .search-keyword-container,
            .search-time-container {
                width: 100% !important;
                padding: 1rem;
            }
            #search-toggle:checked ~ .search-time-container {
                height: 120px;
            }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-primary min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Main Container centered vertically and horizontally -->
<main class="w-full max-w-5xl px-8 z-10">
<div class="flex flex-col items-center">
<!-- Branding Header -->
<div class="text-center mb-12">
    <h1 class="text-5xl font-display font-light tracking-tighter mb-4">罗聘年谱检索</h1>
    <p class="text-lg text-on-surface-variant font-light">Digital Chronicle Search Engine</p>
</div>

<!-- Search Interface Section -->
<div class="w-full max-w-3xl mb-8">
    <div class="relative group">
        <!-- The Search "Vessel" -->
        <div class="bg-surface-container-lowest border border-outline-variant/30 flex items-stretch h-20 transition-all-custom shadow-sm group-hover:shadow-md rounded-2xl overflow-hidden">
            <input class="toggle-input" id="search-toggle" type="checkbox"/>
            <!-- Keyword Section (Left) -->
            <div class="search-keyword-container flex-1 flex items-center px-8 transition-all-custom group/keyword">
                <span class="material-symbols-outlined text-outline mr-4 group-hover/keyword:text-primary transition-colors">search</span>
                <input id="keyword-input" class="w-full bg-transparent border-none focus:ring-0 text-xl font-body placeholder:text-outline/40 placeholder:font-light" placeholder="关键词搜索" type="text" autocomplete="off"/>
                <div id="suggestions" class="absolute top-full left-0 right-0 mt-2 bg-white border border-outline-variant/20 rounded-lg shadow-lg hidden z-20">
                    <!-- Suggestions will be populated here -->
                </div>
            </div>
            <!-- Divider -->
            <div class="w-px bg-outline-variant/20 my-6 transition-opacity duration-300 peer-checked:opacity-0"></div>
            <!-- Time Period Section (Right / Becomes Main) -->
            <label class="search-time-container relative flex items-center transition-all-custom cursor-pointer overflow-hidden group/time" for="search-toggle">
                <!-- Initial State Labels -->
                <div class="absolute inset-0 flex items-center px-8 transition-opacity duration-300 whitespace-nowrap peer-checked:opacity-0 group-has-[:checked]:opacity-0">
                    <span class="material-symbols-outlined mr-4 group-hover/time:text-primary transition-colors text-outline/40">calendar_today</span>
                    <span class="font-body text-xl text-outline/40 font-light">时间段搜索</span>
                </div>
                <!-- Morphed State Inputs -->
                <div class="flex-1 opacity-0 group-has-[:checked]:opacity-100 flex items-center transition-all duration-500 delay-100 h-full w-full">
                    <div class="flex-1 px-8 flex flex-col justify-center">
                        <span class="font-label text-[9px] uppercase tracking-tighter text-outline/60 mb-1">起始年份</span>
                        <input id="start-year" class="w-full bg-transparent border-none focus:ring-0 text-2xl font-body p-0 appearance-none m-0" onclick="event.stopPropagation()" placeholder="1733" type="number" min="1733" max="1799"/>
                    </div>
                    <div class="w-px h-10 bg-outline-variant/30"></div>
                    <div class="flex-1 px-8 flex flex-col justify-center">
                        <span class="font-label text-[9px] uppercase tracking-tighter text-outline/60 mb-1">截至年份</span>
                        <input id="end-year" class="w-full bg-transparent border-none focus:ring-0 text-2xl font-body p-0 appearance-none m-0" onclick="event.stopPropagation()" placeholder="1799" type="number" min="1733" max="1799"/>
                    </div>
                    <!-- Close Toggle -->
                    <button class="px-6 h-full flex items-center justify-center hover:bg-surface-container-low transition-colors group/close" onclick="document.getElementById('search-toggle').checked = false; event.preventDefault();" type="button">
                        <span class="material-symbols-outlined text-outline group-hover/close:text-primary">close</span>
                    </button>
                </div>
            </label>
            <!-- Main Inquiry Button -->
            <button id="search-button" class="bg-primary text-on-primary px-10 h-full flex items-center justify-center active:scale-[0.98] transition-all hover:brightness-110">
                <span class="font-body text-xl font-medium">检索</span>
            </button>
        </div>
        <!-- Search suggestions -->
        <div id="search-suggestions" class="mt-4 flex flex-wrap gap-2 justify-center"></div>
    </div>
</div>

<!-- Search Results Preview -->
<div id="search-preview" class="w-full max-w-3xl hidden">
    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-2xl p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">搜索结果预览</h3>
            <button id="view-all-results" class="text-primary hover:underline text-sm">查看全部结果 →</button>
        </div>
        <div id="preview-results" class="space-y-4">
            <!-- Preview results will be populated here -->
        </div>
    </div>
</div>

<!-- Quick Stats -->
<div id="quick-stats" class="text-center mt-8">
    <div class="flex justify-center gap-8 text-sm text-on-surface-variant">
        <span>总记录: <span id="total-count" class="font-semibold">2296</span></span>
        <span>年份范围: <span id="year-range" class="font-semibold">1733-1799</span></span>
        <span>最近更新: <span class="font-semibold">2026</span></span>
    </div>
</div>

<!-- Loading State -->
<div id="loading-state" class="text-center py-8 hidden">
    <div class="loading-spinner mx-auto mb-4"></div>
    <div class="text-outline">正在搜索...</div>
</div>

<!-- Error State -->
<div id="error-state" class="text-center py-8 hidden">
    <div class="text-red-500 mb-2">搜索失败</div>
    <div class="text-sm text-outline">请检查网络连接或刷新页面重试</div>
</div>

<!-- Bottom Accent -->
<div class="text-center mt-12">
    <a href="keyword-dynamic.html" class="text-primary hover:underline">前往详细搜索结果 →</a>
</div>
</div>
</main>

<!-- Data Loader -->
<script src="data-loader.js"></script>

<script>
// Search functionality
let searchData = [];
let currentSearchParams = {};

// Common search keywords
const commonKeywords = [
    '扬州', '金农', '八怪', '鬼趣图', '梅花', '佛教', '京师', '杭州',
    '诗画', '游历', '交游', '创作', '题跋', '印章', '收藏', '鉴赏'
];

// Initialize search
async function initializeSearch() {
    try {
        searchData = await window.luoPinData.getAllData();

        // Update stats
        document.getElementById('total-count').textContent = searchData.length;

        // Setup suggestions
        setupSearchSuggestions();

        // Setup event listeners
        setupEventListeners();

    } catch (error) {
        console.error('Failed to initialize search:', error);
        document.getElementById('error-state').classList.remove('hidden');
    }
}

// Setup search suggestions
function setupSearchSuggestions() {
    const suggestionsContainer = document.getElementById('search-suggestions');
    suggestionsContainer.innerHTML = commonKeywords.map(keyword =>
        `<button class="px-3 py-1 text-sm border border-outline-variant/30 rounded-full hover:bg-primary/10 hover:text-primary transition-colors" onclick="quickSearch('${keyword}')">${keyword}</button>`
    ).join('');
}

// Setup event listeners
function setupEventListeners() {
    const searchButton = document.getElementById('search-button');
    const keywordInput = document.getElementById('keyword-input');
    const startYearInput = document.getElementById('start-year');
    const endYearInput = document.getElementById('end-year');
    const viewAllButton = document.getElementById('view-all-results');

    // Search button click
    searchButton.addEventListener('click', performSearch);

    // Enter key on inputs
    keywordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });
    startYearInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });
    endYearInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });

    // View all results
    viewAllButton.addEventListener('click', () => {
        const params = new URLSearchParams(currentSearchParams);
        window.location.href = `keyword-dynamic.html?${params.toString()}`;
    });

    // Real-time search preview
    let searchTimeout;
    keywordInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performPreviewSearch, 500);
    });
    startYearInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performPreviewSearch, 500);
    });
    endYearInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performPreviewSearch, 500);
    });
}

// Quick search
function quickSearch(keyword) {
    document.getElementById('keyword-input').value = keyword;
    performSearch();
}

// Perform search
async function performSearch() {
    const keyword = document.getElementById('keyword-input').value.trim();
    const startYear = document.getElementById('start-year').value;
    const endYear = document.getElementById('end-year').value;
    const isTimeMode = document.getElementById('search-toggle').checked;

    currentSearchParams = {};

    if (keyword) {
        currentSearchParams.q = keyword;
    }

    if (isTimeMode && startYear && endYear) {
        currentSearchParams.start = startYear;
        currentSearchParams.end = endYear;
    }

    // Navigate to results page
    const params = new URLSearchParams(currentSearchParams);
    window.location.href = `keyword-dynamic.html?${params.toString()}`;
}

// Perform preview search
async function performPreviewSearch() {
    const keyword = document.getElementById('keyword-input').value.trim();
    const startYear = document.getElementById('start-year').value;
    const endYear = document.getElementById('end-year').value;
    const isTimeMode = document.getElementById('search-toggle').checked;

    if (!keyword && !isTimeMode) {
        document.getElementById('search-preview').classList.add('hidden');
        return;
    }

    let results = searchData;

    // Filter by keyword
    if (keyword) {
        results = results.filter(item => {
            const searchTerm = keyword.toLowerCase();
            return (
                (item.title && item.title.toLowerCase().includes(searchTerm)) ||
                (item.description && item.description.toLowerCase().includes(searchTerm)) ||
                (item.qing_calendar && item.qing_calendar.toLowerCase().includes(searchTerm)) ||
                (item.reference && item.reference.toLowerCase().includes(searchTerm))
            );
        });
    }

    // Filter by year range
    if (isTimeMode && startYear && endYear) {
        const start = parseInt(startYear);
        const end = parseInt(endYear);
        results = results.filter(item => {
            const year = parseInt(item.year);
            return year >= start && year <= end;
        });
    }

    // Show preview
    showPreview(results.slice(0, 3), results.length);
}

// Show preview results
function showPreview(results, totalCount) {
    const previewContainer = document.getElementById('search-preview');
    const previewResults = document.getElementById('preview-results');

    if (results.length === 0) {
        previewContainer.classList.add('hidden');
        return;
    }

    previewResults.innerHTML = results.map(item => `
        <div class="p-4 border border-outline-variant/20 rounded-lg">
            <div class="flex justify-between items-start mb-2">
                <span class="font-semibold">${item.year}年</span>
                <span class="text-sm text-outline">${item.qing_calendar}</span>
            </div>
            <div class="text-sm text-on-surface-variant line-clamp-2">${item.description}</div>
        </div>
    `).join('');

    document.getElementById('view-all-results').textContent = `查看全部 ${totalCount} 条结果 →`;
    previewContainer.classList.remove('hidden');
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initializeSearch);
</script>

</body></html>
